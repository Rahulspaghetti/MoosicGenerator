services:
  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-spaghettitunes}:${POSTGRES_PASSWORD:-spaghettitunes}@db:5432/${POSTGRES_DB:-spaghettitunes}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app

  worker:
    build:
      context: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-spaghettitunes}:${POSTGRES_PASSWORD:-spaghettitunes}@db:5432/${POSTGRES_DB:-spaghettitunes}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend/app:/app/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spaghettitunes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spaghettitunes}
      POSTGRES_DB: ${POSTGRES_DB:-spaghettitunes}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spaghettitunes}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
